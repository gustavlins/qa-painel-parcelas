name: Painel de parcelas - Testes E2E

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    cypress-run:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repositorio
              uses: actions/checkout@v3

            - name: Instalar as dependencias do Cypress
              run: npm install

            - name: Rodar testes Cypress
              run: npx cypress run
            
            - name: Salver as evidencias dos testes
              if: failure()
              uses: actions/upload-artifact@v3
              with:
                name: cypress-screenshots
                path: cypress/screenshots